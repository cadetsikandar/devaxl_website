<!-- @dsCard group="Type" viewport="700x170" name="Mono & Eyebrow" subtitle="Geist Mono for code/metadata; tracked caps for overlines" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--canvas);font-family:var(--font-sans);color:var(--text-primary);padding:28px;display:flex;flex-direction:column;gap:22px;}
  .eyebrow{font-size:var(--fs-caption);text-transform:uppercase;letter-spacing:var(--ls-caps);color:var(--accent);font-weight:600;}
  .mono{font-family:var(--font-mono);font-size:var(--fs-body-sm);color:var(--text-secondary);background:var(--surface-2);border:1px solid var(--border-default);border-radius:var(--radius-sm);padding:10px 14px;width:max-content;}
  .meta{font-family:var(--font-mono);font-size:11px;color:var(--text-tertiary);}
</style></head>
<body>
  <div><div class="eyebrow">Platform Engineering</div><div class="meta" style="margin-top:6px">Eyebrow · 13 caps · tracking 0.12em · accent</div></div>
  <div><div class="mono">$ devaxl deploy --prod</div><div class="meta" style="margin-top:6px">Geist Mono · 14 · code, shell, metadata</div></div>
</body></html>
