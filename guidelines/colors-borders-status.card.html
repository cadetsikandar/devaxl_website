<!-- @dsCard group="Colors" viewport="700x150" name="Borders & Status" subtitle="Hairlines at low alpha; restrained semantic colors" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--canvas);font-family:var(--font-sans);color:var(--text-primary);padding:24px;display:flex;gap:28px;}
  .col{flex:1;}
  .h{font-size:11px;letter-spacing:var(--ls-caps);text-transform:uppercase;color:var(--text-tertiary);margin-bottom:12px;}
  .lines{display:flex;flex-direction:column;gap:10px;}
  .b{height:1px;}
  .lbl{font-family:var(--font-mono);font-size:11px;color:var(--text-secondary);margin-top:4px;}
  .dots{display:flex;gap:18px;}
  .dot{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-secondary);}
  .d{width:12px;height:12px;border-radius:50%;}
</style></head>
<body>
  <div class="col">
    <div class="h">Hairlines</div>
    <div class="lines">
      <div><div class="b" style="background:var(--line-faint)"></div><div class="lbl">--line-faint · .06</div></div>
      <div><div class="b" style="background:var(--line-subtle)"></div><div class="lbl">--line-subtle · .09</div></div>
      <div><div class="b" style="background:var(--line)"></div><div class="lbl">--line · .13</div></div>
      <div><div class="b" style="background:var(--line-strong)"></div><div class="lbl">--line-strong · .20</div></div>
    </div>
  </div>
  <div class="col">
    <div class="h">Status — sparing use</div>
    <div class="dots" style="flex-direction:column;gap:14px;">
      <div class="dot"><span class="d" style="background:var(--status-success)"></span>Success · --green-400</div>
      <div class="dot"><span class="d" style="background:var(--status-danger)"></span>Danger · --red-400</div>
      <div class="dot"><span class="d" style="background:var(--status-info)"></span>Info · --blue-400</div>
    </div>
  </div>
</body></html>
