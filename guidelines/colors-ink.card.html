<!-- @dsCard group="Colors" viewport="700x160" name="Text — Ink Ramp" subtitle="Off-white primary fading to muted greys" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--canvas);font-family:var(--font-sans);padding:24px;}
  .stack{display:flex;flex-direction:column;gap:14px;}
  .line{display:flex;align-items:baseline;gap:16px;}
  .label{font-size:22px;font-weight:600;letter-spacing:-0.02em;width:340px;}
  .meta{font-family:var(--font-mono);font-size:11px;color:var(--text-tertiary);}
</style></head>
<body>
  <div class="stack">
    <div class="line"><span class="label" style="color:var(--text-primary)">Primary — ships world-class software</span><span class="meta">--text-primary · #F4F4F1</span></div>
    <div class="line"><span class="label" style="color:var(--text-secondary)">Secondary — supporting detail</span><span class="meta">--text-secondary · #9A9A98</span></div>
    <div class="line"><span class="label" style="color:var(--text-tertiary)">Tertiary — captions & meta</span><span class="meta">--text-tertiary · #6E6E6E</span></div>
    <div class="line"><span class="label" style="color:var(--text-disabled)">Disabled — inactive state</span><span class="meta">--text-disabled · #4A4A4D</span></div>
  </div>
</body></html>
