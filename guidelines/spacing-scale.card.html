<!-- @dsCard group="Spacing" viewport="700x200" name="Spacing Scale" subtitle="4px base grid — generous rhythm" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--canvas);font-family:var(--font-sans);color:var(--text-primary);padding:28px;}
  .row{display:flex;align-items:flex-end;gap:14px;}
  .item{display:flex;flex-direction:column;align-items:flex-start;gap:8px;}
  .bar{background:var(--accent);border-radius:2px;height:16px;}
  .n{font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary);}
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="width:4px"></div><div class="n">1·4</div></div>
    <div class="item"><div class="bar" style="width:8px"></div><div class="n">2·8</div></div>
    <div class="item"><div class="bar" style="width:12px"></div><div class="n">3·12</div></div>
    <div class="item"><div class="bar" style="width:16px"></div><div class="n">4·16</div></div>
    <div class="item"><div class="bar" style="width:24px"></div><div class="n">6·24</div></div>
    <div class="item"><div class="bar" style="width:32px"></div><div class="n">8·32</div></div>
    <div class="item"><div class="bar" style="width:48px"></div><div class="n">12·48</div></div>
    <div class="item"><div class="bar" style="width:64px"></div><div class="n">16·64</div></div>
    <div class="item"><div class="bar" style="width:96px"></div><div class="n">24·96</div></div>
    <div class="item"><div class="bar" style="width:128px"></div><div class="n">32·128</div></div>
  </div>
</body></html>
