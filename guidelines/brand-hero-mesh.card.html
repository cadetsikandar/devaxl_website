<!-- @dsCard group="Brand" viewport="700x220" name="Hero Mesh Glow" subtitle="Stripe-style amber mesh at low opacity — hero only" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--canvas);font-family:var(--font-sans);color:var(--text-primary);height:220px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
  .mesh{position:absolute;inset:0;background:var(--hero-mesh);}
  .t{position:relative;text-align:center;}
  .t h1{margin:0;font-size:38px;font-weight:600;letter-spacing:var(--ls-tighter);}
  .t p{margin:8px 0 0;font-family:var(--font-mono);font-size:11px;color:var(--text-tertiary);}
</style></head>
<body>
  <div class="mesh"></div>
  <div class="t"><h1>Glow behind the hero<span style="color:var(--accent)">.</span></h1><p>--hero-mesh · radial amber, ≤18% opacity</p></div>
</body></html>
