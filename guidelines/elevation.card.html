<!-- @dsCard group="Spacing" viewport="700x230" name="Elevation" subtitle="Hairline ring + soft black shadow; accent glow for the one highlight" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--canvas);font-family:var(--font-sans);color:var(--text-primary);padding:32px;display:flex;gap:24px;align-items:center;}
  .card{width:130px;height:120px;background:var(--surface-1);border:1px solid var(--border-default);border-radius:var(--radius-lg);display:flex;align-items:flex-end;padding:12px;}
  .n{font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary);}
</style></head>
<body>
  <div class="card" style="box-shadow:var(--shadow-sm),var(--inner-top)"><span class="n">shadow-sm</span></div>
  <div class="card" style="box-shadow:var(--shadow-md),var(--inner-top)"><span class="n">shadow-md</span></div>
  <div class="card" style="box-shadow:var(--shadow-lg),var(--inner-top)"><span class="n">shadow-lg</span></div>
  <div class="card" style="box-shadow:var(--glow-accent);border-color:transparent"><span class="n" style="color:var(--accent)">glow-accent</span></div>
</body></html>
