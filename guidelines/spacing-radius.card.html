<!-- @dsCard group="Spacing" viewport="700x180" name="Corner Radii" subtitle="Composed, not bubbly" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--canvas);font-family:var(--font-sans);color:var(--text-primary);padding:28px;}
  .row{display:flex;gap:16px;}
  .item{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .box{width:78px;height:78px;background:var(--surface-2);border:1px solid var(--border-default);box-shadow:var(--inner-top);}
  .n{font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary);}
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:var(--radius-xs)"></div><div class="n">xs·4</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="n">sm·6</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><div class="n">md·10</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="n">lg·14</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="n">xl·20</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-2xl)"></div><div class="n">2xl·28</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-pill)"></div><div class="n">pill</div></div>
  </div>
</body></html>
