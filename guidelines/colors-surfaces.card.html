<!-- @dsCard group="Colors" viewport="700x180" name="Canvas & Surfaces" subtitle="Near-black canvas with subtly lifted card surfaces" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--canvas);font-family:var(--font-sans);color:var(--text-primary);padding:24px;}
  .row{display:flex;gap:14px;}
  .sw{flex:1;height:108px;border-radius:var(--radius-md);border:1px solid var(--border-default);display:flex;flex-direction:column;justify-content:flex-end;padding:12px;box-shadow:var(--inner-top);}
  .name{font-size:13px;font-weight:600;letter-spacing:-0.01em;}
  .hex{font-family:var(--font-mono);font-size:11px;color:var(--text-tertiary);margin-top:2px;}
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--canvas)"><div class="name">Canvas</div><div class="hex">#0A0A0C</div></div>
    <div class="sw" style="background:var(--surface-1)"><div class="name">Surface 1</div><div class="hex">#121216</div></div>
    <div class="sw" style="background:var(--surface-2)"><div class="name">Surface 2</div><div class="hex">#18181E</div></div>
    <div class="sw" style="background:var(--surface-3)"><div class="name">Surface 3</div><div class="hex">#202028</div></div>
    <div class="sw" style="background:var(--surface-4)"><div class="name">Surface 4</div><div class="hex">#2A2A33</div></div>
  </div>
</body></html>
