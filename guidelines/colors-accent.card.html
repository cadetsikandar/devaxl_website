<!-- @dsCard group="Colors" viewport="700x180" name="Accent — Amber" subtitle="The one accent. #FFB600 — used sparingly" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--canvas);font-family:var(--font-sans);color:var(--text-primary);padding:24px;}
  .scale{display:flex;gap:8px;}
  .sw{flex:1;height:64px;border-radius:var(--radius-sm);display:flex;align-items:flex-end;padding:8px;}
  .t{font-family:var(--font-mono);font-size:10px;color:rgba(0,0,0,0.55);}
  .note{margin-top:16px;display:flex;align-items:center;gap:12px;font-size:13px;color:var(--text-secondary);}
  .chip{font-family:var(--font-mono);font-size:11px;background:var(--accent-quiet);color:var(--accent);padding:4px 10px;border-radius:var(--radius-pill);border:1px solid rgba(255,182,0,0.25);}
</style></head>
<body>
  <div class="scale">
    <div class="sw" style="background:var(--amber-50)"><span class="t">50</span></div>
    <div class="sw" style="background:var(--amber-100)"><span class="t">100</span></div>
    <div class="sw" style="background:var(--amber-200)"><span class="t">200</span></div>
    <div class="sw" style="background:var(--amber-300)"><span class="t">300</span></div>
    <div class="sw" style="background:var(--amber-400);outline:2px solid var(--white);outline-offset:2px"><span class="t" style="color:rgba(255,255,255,0.85)">400 ·brand</span></div>
    <div class="sw" style="background:var(--amber-500)"><span class="t" style="color:rgba(255,255,255,0.8)">500</span></div>
    <div class="sw" style="background:var(--amber-600)"><span class="t" style="color:rgba(255,255,255,0.8)">600</span></div>
    <div class="sw" style="background:var(--amber-700)"><span class="t" style="color:rgba(255,255,255,0.8)">700</span></div>
  </div>
  <div class="note"><span class="chip">--accent #FFB600</span> Reserve for CTAs, one key highlight, a single hero detail. Never flood.</div>
</body></html>
